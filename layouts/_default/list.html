{{ define "main" }}
<section class="collection-page collection-page--{{ .Section }}">
  <div class="site-shell">
    <header class="collection-page-header">
      <span class="collection-emblem collection-emblem--{{ .Section }}" aria-hidden="true"></span>
      <div>
        <h1>{{ .Title }}</h1>
        {{ with .Content }}<div class="collection-copy">{{ . }}</div>{{ end }}
      </div>
    </header>

    <div class="archive-grid collection-grid" aria-label="{{ .Title }}列表">
      {{ range $index, $page := .RegularPages.ByDate.Reverse }}
        {{ partial "record-tile.html" (dict "page" $page "index" $index) }}
      {{ else }}
        <p class="empty-copy">这里还没有公开内容。</p>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
