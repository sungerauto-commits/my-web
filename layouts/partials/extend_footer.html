{{- /* Darkroom reveal and bandwidth-aware hero video loading. */ -}}
<script>
(function () {
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  var saveData = Boolean(connection && connection.saveData);
  var heroVideo = document.querySelector('[data-hero-video]');

  if (heroVideo) {
    if (reduce || saveData) {
      heroVideo.pause();
      heroVideo.removeAttribute('src');
      heroVideo.querySelectorAll('source').forEach(function (source) {
        source.removeAttribute('src');
      });
      heroVideo.load();
    } else {
      var showVideo = function () { heroVideo.classList.add('is-ready'); };

      if (heroVideo.readyState >= 2) {
        showVideo();
      } else {
        heroVideo.addEventListener('loadeddata', showVideo, { once: true });
      }

      var play = heroVideo.play();
      if (play && typeof play.catch === 'function') {
        play.catch(function () {});
      }
    }
  }

  var elements = document.querySelectorAll('.reveal');

  if (reduce || !('IntersectionObserver' in window)) {
    elements.forEach(function (element) { element.classList.add('in'); });
    return;
  }

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('in');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

  elements.forEach(function (element) { observer.observe(element); });
})();
</script>
