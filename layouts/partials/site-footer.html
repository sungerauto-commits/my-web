<footer class="site-footer">
  <div class="site-shell site-footer-inner">
    <div class="footer-identity">
      <a class="footer-wordmark" href="{{ "" | relURL }}">SungerClub</a>
      <p>{{ site.Params.description | default "我写的东西、拍的照片、录的影像。" }}</p>
    </div>
    <nav class="footer-navigation" aria-label="页脚导航">
      {{ range site.Menus.main }}
        {{ if in (slice "posts" "photos" "videos") .Identifier }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
    <p class="footer-copyright">&copy; {{ now.Year }} SungerClub</p>
  </div>
</footer>
