{{ define "main" }}
<article class="post-single media-page media-page--photos">
  <header class="post-header">
    {{ partial "breadcrumbs.html" . }}
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
    {{ with .Params.caption }}<div class="post-description">{{ . }}</div>{{ end }}
    {{ partial "post_meta.html" . }}
  </header>

  {{ with .Params.gallery }}
  <div class="photo-gallery">
    {{ range $index, $image := . }}
    <a class="photo-item" href="{{ $image }}" target="_blank" rel="noopener"
      aria-label="查看照片 {{ add $index 1 }}">
      <img src="{{ $image }}" alt="{{ $.Title }}，照片 {{ add $index 1 }}"
        loading="{{ cond (eq $index 0) "eager" "lazy" }}">
    </a>
    {{ end }}
  </div>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    {{ partial "post_nav_links.html" . }}
  </footer>
</article>
{{ end }}
