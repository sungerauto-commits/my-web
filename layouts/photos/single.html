{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    {{ partial "breadcrumbs.html" . }}
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
    {{ with .Params.caption }}<div class="post-description">{{ . }}</div>{{ end }}
    {{ partial "post_meta.html" . }}
  </header>

  {{ with .Params.gallery }}
  <div class="photo-gallery" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin:1rem 0;">
    {{ range . }}
    <a href="{{ . }}" target="_blank" rel="noopener">
      <img src="{{ . }}" loading="lazy" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
    </a>
    {{ end }}
  </div>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    {{ partial "post_nav_links.html" . }}
  </footer>
</article>
{{ end }}
