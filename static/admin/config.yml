# SungerClub —— Sveltia CMS 配置
# 文档: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: sungerauto-commits/my-web      # 你的 GitHub 仓库
  branch: main
  # Cloudflare Worker OAuth 代理
  base_url: https://sveltia-cms-auth.sungerauto.workers.dev

# 本地开发：在站点根目录跑 `npx @sveltia/cms-server` 后，
# 用浏览器打开 /admin/ 选「Work with Local Repository」即可免代理直接编辑。
# 上线生产环境登录则需要上面的 base_url（OAuth 代理）。

# Git 仓库内的兜底媒体目录（小图标等；大文件走 Cloudinary）
media_folder: "static/images/uploads"
public_folder: "/my-web/images/uploads"

# Cloudinary：照片和视频「直接上传」到云端，仓库里只存链接
media_libraries:
  cloudinary:
    config:
      cloud_name: dgoqzxprh
      api_key: "575487189727376"     # Cloudinary 控制台 → API Key（公开值，可放前端）
    # 直接返回完整 https 链接，方便 Hugo 渲染
    output_filename_only: false

# ===== 内容栏目 =====
collections:
  # —— 文章 ——
  - name: posts
    label: 文章
    label_singular: 文章
    folder: content/posts
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 摘要, name: description, widget: text, required: false }
      - { label: 标签, name: tags, widget: list, required: false }
      - { label: 封面图, name: cover, widget: object, required: false, fields: [
            { label: 图片, name: image, widget: image, media_library: cloudinary, required: false },
            { label: 替代文字, name: alt, widget: string, required: false } ] }
      - { label: 正文, name: body, widget: markdown }

  # —— 照片 ——
  - name: photos
    label: 照片
    label_singular: 相册
    folder: content/photos
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 说明, name: caption, widget: text, required: false }
      - { label: 封面, name: cover, widget: object, required: false, fields: [
            { label: 图片, name: image, widget: image, media_library: cloudinary, required: false },
            { label: 替代文字, name: alt, widget: string, required: false } ] }
      - label: 照片们
        name: gallery
        widget: list
        required: false
        field: { label: 照片, name: photo, widget: image, media_library: cloudinary }
      - { label: 备注, name: body, widget: markdown, required: false }

  # —— 视频 ——
  - name: videos
    label: 视频
    label_singular: 视频
    folder: content/videos
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 简介, name: description, widget: text, required: false }
      # 视频文件：上传到 Cloudinary，存完整直链
      - { label: 视频文件, name: video, widget: file, media_library: cloudinary }
      - { label: 封面图(可选), name: poster, widget: image, media_library: cloudinary, required: false }
      - { label: 备注, name: body, widget: markdown, required: false }
